name: generate bomberman contribution graph

on:
  schedule:
    # Runs every day at midnight UTC — keeps the graph current
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows manual trigger from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: generate bomberman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: bomberman

      # Push the generated SVGs to the output branch
      - name: push bomberman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
